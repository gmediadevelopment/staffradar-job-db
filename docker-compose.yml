services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: staffradar_jobs
      POSTGRES_USER: staffradar
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staffradar -d staffradar_jobs"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4500:4500"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://staffradar:${DB_PASSWORD:-changeme}@db:5432/staffradar_jobs
      RUN_ON_START: "true"

volumes:
  pgdata:
